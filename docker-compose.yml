services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PORT: "3003" # <--- FIXED: Tells Next.js to compile using port 3003
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3003} # <--- FIXED: Match fallback port
        OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
        MONGODB_URI: mongodb://collector_user:AaBb1234!@collector-mongo:27017/collector-app?authSource=admin
    container_name: collector-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3003 
      HOSTNAME: "0.0.0.0"
      MONGODB_URI: mongodb://collector_user:AaBb1234!@collector-mongo:27017/collector-app?authSource=admin
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3003} # <--- FIXED: Match fallback port
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - uploads_data:/app/uploads
    depends_on: 
      collector-mongo:
        condition: service_healthy
    networks:
      - proxy-net

  collector-mongo:
    image: mongo:7
    container_name: collector-mongo
    restart: unless-stopped
    ports:
      - "27019:27017"
    command: ["mongod", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: collector_user
      MONGO_INITDB_ROOT_PASSWORD: AaBb1234!
      MONGO_INITDB_DATABASE: collector-app
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "collector_user", "-p", "AaBb1234!", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - proxy-net


volumes:
  mongo_data:
  uploads_data:

networks:
  proxy-net:
    external: true
