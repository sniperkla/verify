services:
  app:
    build:
      context: /root/collector-app
      dockerfile: Dockerfile
    container_name: collector-app
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://collector-mongo:27017/collector-app
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://your-domain.com}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - proxy-net

  mongo:
    image: mongo:7
    container_name: collector-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - proxy-net

volumes:
  mongo_data:
  uploads_data:

networks:
  proxy-net:
    external: true